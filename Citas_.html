<!DOCTYPE>

<head>
<title> PUNTO SALUD </title>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
* {
  box-sizing: border-box;
}
header {
  font-family:sans-serif;
  background-color:#C3E3FD;
  padding: 30px;
  text-align: center;
  font-size: 35px;
  color: #2196F3;
}
section {
    display: flex;
    align-items: stretch;
    min-height: max-content;
}
nav {
  float: left;
  width: 20%;
  background: #9ACEF8;
  padding: 20px;
}
article {
  font-family:sans-serif;
  float: left;
  width: 80%;
  background-color: #E8F5FF;
  text-align: center;
  display: flex;
  flex-direction: column;
  align-items: center;
}
.form-container {
  max-width: 500px;
  width: 100%;
  background: white;
  padding: 35px;
  border-radius: 12px;
}

.form-group {
  margin-bottom: 22px;
}
label {
  display: block;
  margin-bottom: 8px;
  font-weight: 600;
  font-size: 14px;
}
input[type="text"], input[type="number"], input[type="date"] {
  width: 100%;
  padding: 12px;
  border: 1px solid #C3E3FD;
  border-radius: 6px;
  color: #333;
}
input:focus {
  outline: none;
  border-color: #2196F3;
}
.btn-submit {
  background-color: #6EB8F5;
  color: white;
  border: none;
  padding: 14px 15px;
  width: 100%;
  border-radius: 6px;
  font-size: 16px;
  margin-top: 10px;
}
.btn-submit:hover {
  background-color: #2874a6;
}
.btn-back {
  display: inline-block;
  text-align: center;
  margin-top: 25px;
}
footer {
  font-family:sans-serif;
  background-color: #6EB8F5;
  padding: 10px;
  text-align: center;
  color: white;
}
</style>
</head>

<h2>  Citas </h2>

    <div class="form-container">
            <div class="form-group">
                <label>Fecha:</label>
                <input type="date" required>
            </div>
           
            <div class="form-group">
                <label>Hora:</label>
                <input type="time" required>
            </div>
           
            <div class="form-group">
                <label>Motivo:</label>
                <input type="text" required>
            </div>
	
  	    <div class="form-group">
		<label>Medico:</label>
                <select required>
                    <option>Villamizar</option>
                    <option>Santamaria</option>
                    <option>Alvarez</option>
                    <option>Arboleda</option>
                    <option>Casal</option>
                </select>
	    </div>

	    <div class="form-group">
		<label>ID:</label>
		<input type="text" required>
	   </div>

	   <div class="campo">
            <label>¿Qué deseas buscar?</label>
		<select required>
                <option>Confirmada</option>
                <option>Pendiente</option>
                <option>Cancelada</option>
		</select>
           </div>

            <button type="submit" class="btn-submit">Dar de alta la Cita</button>
        </form>
    </div>

</article>
